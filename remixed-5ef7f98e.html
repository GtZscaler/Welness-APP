function Screensaver({curD,totD,themeColor,isGeet}){
  const [url,setUrl]=useState(null);
  const [err,setErr]=useState(false);
  const queries=isGeet?GEET_QUERIES:KANAK_QUERIES;
  const qi=dailyIdx(queries.length);
  const {q,quote}=queries[qi];

  useEffect(()=>{
    setUrl(null);setErr(false);
    // Try Unsplash API first
    fetch(`https://api.unsplash.com/photos/random?query=${encodeURIComponent(q)}&orientation=landscape&client_id=YpOREbdFJO5N_bHDVt2JlNT0gvqxgvkLXlT8JZicUmA`)
      .then(r=>{if(!r.ok)throw new Error();return r.json();})
      .then(d=>{
        if(d&&d.urls&&d.urls.regular){setUrl(d.urls.regular);}
        else{throw new Error();}
      })
      .catch(()=>{
        // Fallback: Picsum random landscape
        setUrl(`https://picsum.photos/seed/${qi+curD}/800/360`);
      });
  },[qi]);

  return(
    <div style={{position:"relative",height:170,borderRadius:16,overflow:"hidden",background:"#1e293b",marginBottom:12,boxShadow:"0 4px 20px #00000022"}}>
      {!url&&!err&&(

        <span style={{fontSize:10,color:"#fff",fontWeight:700}}>Day {curD}/{totD}</span>

  );
}

function getGP(date){
  const d=new Date(date);d.setHours(0,0,0,0);
  const n=dB(START,d)+1,w=Math.ceil(n/7),dow=d.getDay();
  let km=0,rt="rest",rn="Rest — recover 🧘";
  if(w===1){if([1,3,6].includes(dow)){km=3;rt="run";rn="Easy jog 🌅"}else if(dow===0){km=5;rt="long";rn="Week 1 long run 💪"}}
  else if(w===2){if([1,3,5].includes(dow)){km=4;rt="run";rn="Conversational pace 😤"}else if(dow===6){km=5;rt="run"}else if(dow===0){km=6;rt="long";rn="Long run 🏃"}}
  else if(w===3){if([1,2,3,5].includes(dow)){km=5;rt="run";rn="Build consistency 📈"}else if(dow===6){km=6;rt="run"}else if(dow===0){km=7;rt="long";rn="Big run 💥"}}
  else if(w===4){if([1,2].includes(dow)){km=6;rt="run"}else if([4,5].includes(dow)){km=6;rt="run"}else if(dow===6){km=7;rt="run";rn="Strong Saturday 🏆"}else if(dow===0){km=8;rt="long";rn="FIRST 8KM! 🎉"}}
  else if(w===5){if(dow===1){km=7;rt="run"}else if([2,3].includes(dow)){km=8;rt="run"}else if(dow===4){km=7;rt="run"}else if([5,6].includes(dow)){km=8;rt="run"}else if(dow===0){km=9;rt="long";rn="Week 5 peak! 🚀"}}
  else if(w===6){km=dB(START,d)>=38?10:9;rt=km===10?"goal":"run";rn=km===10?"🎯 10KM! GROUSE GRIND! 🏔️":"Final prep 💨";}
  let upper=null,lower=null,core=null,sn="";
  if(rt==="rest"){upper=n%2===0?GUA:GUB;lower=n%2===0?GLA:GLB;core=[GCO[n%3]];sn="Full strength 💪";}
  else if(km<=5){lower=n%2===0?GLA:GLB;core=[GCO[(n+1)%3]];sn="After run: lower + core 🦵";}
  else if(km<=7){upper=n%2===0?GUA:GUB;core=[GCO[(n+2)%3]];sn="After run: upper + core 💪";}
  else{core=[GCO[n%3]];sn="Long run day — core only 🔥";}
  return{n,w,dow,km,rt,rn,upper,lower,core,sn,meal:sI(MEALS,n-1),tea:sI(TEAS,n-1),IF:gIF(w),wt:dow===0||dow===6?"Flexible 🌅":"5:30–7:30 PM 🌆"};
}
function getKP(date){

  const n=dB(START,d)+1,w=Math.ceil(n/7),dow=d.getDay();

  else if(w===5){if([1,2,3,4,5].includes(dow)){ac="walk_jog";km=4;an="Walk 2→Jog 2 🏃‍♀️"}else{ac="walk_jog";km=4.5;an:"Weekend push 💪"}}
  else{const g=dB(START,d)>=38;km=g?5:4.5;ac=g?"jog":"walk_jog";an=g?"🎯 5KM! RUN QUEEN 👑":"Final prep 🔥";}
  let toning=[],tl="",tn="";

  else{const r=n%4;if(r===0){toning=KCO;tl="Core & Belly 🔥";tn="20 min belly!";}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            {[{icon:"🍎",title:"iPhone",steps:["Open in Safari","Share → Add to Home Screen","Open app → tap Enable"]},{icon:"🤖",title:"Android",steps:["Open in Chrome","⋮ → Add to Home Screen","Open app → tap Enable"]}].map((d,i)=>(
              <div key={i} style={{background:"#fff",border:`1.5px solid ${T.p}33`,borderRadius:16,padding:14}}>
                <p style={{fontSize:22,marginBottom:4}}>{d.icon}</p>
                <p style={{fontSize:13,fontWeight:800,color:T.p,marginBottom:8}}>{d.title}</p>
                {d.steps.map((s,j)=>(
                  <div key={j} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:5}}>
                    <span style={{width:18,height:18,borderRadius:"50%",background:`linear-gradient(135deg,${T.p},${T.s})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff",flexShrink:0}}>{j+1}</span>
                    <p style={{fontSize:11,color:T.dim,lineHeight:1.4}}>{s}</p>
                  </div>
                ))}
              </div>
            ))}
          </div>
          <div style={{background:"#fff",border:`1.5px solid ${T.p}22`,borderRadius:18,overflow:"hidden",marginBottom:14}}>
            <div style={{background:T.ac,padding:"12px 16px",borderBottom:`1px solid ${T.p}22`}}>
              <p style={{fontSize:13,fontWeight:900,color:T.p}}>⏰ Daily schedule</p>
            </div>
            {[
              {time:"8:00 AM",icon:"☀️",label:"Morning",msg:`Morning drink + fast til ${plan.IF.open}`},
              {time:"10:30 AM",icon:"💧",label:"Hydration",msg:"Water check · eating window soon!"},
              {time:"12:00 PM",icon:"🎉",label:"Window open!",msg:`Brunch: ${plan.meal?.br?.n||"today's meal"}`},
              {time:"2:30 PM",icon:"⚡",label:"Energy check",msg:"Afternoon water + snack prep"},
              {time:"4:30 PM",icon:"🍎",label:"Snack",msg:`${plan.meal?.sn?.n||"healthy snack"}`},
              {time:"5:30 PM",icon:isG?"🏃":"💃",label:isG?"Run time!":"Toning time!",msg:isG?"Shoes on. Let's GO!":"Music on. 20 min!"},
              ...(!isG?[{time:"6:45 PM",icon:"🪔",label:"Pooja time",msg:"Swami Samarth Sandhya Pooja 🙏"}]:[]),
              {time:"7:00 PM",icon:"🍽️",label:"Dinner",msg:`${plan.meal?.dn?.n||"tonight's meal"}`},
              {time:"8:00 PM",icon:"🔒",label:"Kitchen closed",msg:"No eating after 8pm · Great work!"},
            ].map((r,i,arr)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",borderBottom:i<arr.length-1?`1px solid ${T.ac}`:"none",background:i%2===0?"transparent":T.ac+"44"}}>
                <div style={{width:40,height:40,borderRadius:12,background:T.ac,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{r.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                    <span style={{fontSize:12,fontWeight:900,color:T.p}}>{r.time}</span>
                    <span style={{fontSize:11,fontWeight:700,color:T.tx}}>{r.label}</span>
                  </div>
                  <p style={{fontSize:11,color:T.dim,lineHeight:1.3}}>{r.msg}</p>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:T.ac,border:`1.5px solid ${T.p}33`,borderRadius:16,padding:16}}>
            <p style={{fontSize:13,fontWeight:900,color:T.p,marginBottom:4}}>⚡ Backup — set in your Clock app</p>
            <p style={{fontSize:11,color:T.dim,marginBottom:12}}>100% reliable · takes 2 minutes</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {["8:00 AM · Morning","12:00 PM · Eat","4:30 PM · Snack",isG?"5:30 PM · Run 🏃":"5:30 PM · Tone 💃",!isG?"6:45 PM · Pooja 🪔":"6:30 PM · Walk","8:00 PM · Close 🔒"].map((a,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:10,padding:"8px 10px",border:`1px solid ${T.p}22`,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:13}}>⏰</span>
                  <span style={{fontSize:11,fontWeight:700,color:T.tx}}>{a}</span>
                </div>
              ))}
            </div>
          </div>
        </div>}

        {/* CALENDAR */}
        {tab==="calendar"&&<div>
          <div style={card}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
              {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:T.dim}}>{d}</div>)}
            </div>
            {(()=>{
              const rows=[];let row=[];
              for(let i=0;i<START.getDay();i++) row.push(null);
              allDays.forEach(d=>{if(row.length===7){rows.push(row);row=[];}row.push(d);});
              while(row.length<7) row.push(null);rows.push(row);
              return rows.map((r,ri)=>(
                <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
                  {r.map((d,di)=>{
                    if(!d)return<div key={di}/>;
                    const dp=isG?getGP(d):getKP(d);
                    const dc=isG?(GRC[dp.rt]||GRC.rest):(KAC[dp.ac]||KAC.rest);
                    const isV=d.toDateString()===vd.toDateString();
                    const isT=d.toDateString()===eff.toDateString();
                    return(
                      <div key={di} onClick={()=>{setVD(new Date(d));setTab("today");setCK({});}}
                        style={{background:isV?dc.badge:dc.bg,border:`1px solid ${isV?dc.badge:dc.bd}`,borderRadius:5,padding:"3px 1px",textAlign:"center",opacity:d<eff&&!isT?0.3:1,cursor:"pointer",position:"relative"}}>
                        {isT&&<div className="pulse" style={{position:"absolute",top:1,right:1,width:4,height:4,borderRadius:"50%",background:T.p}}/>}
                        <div style={{fontSize:8,color:isV?"#fff":dc.tx,fontWeight:700}}>{d.getDate()}</div>
                        <div style={{fontSize:9}}>{dc.em}</div>
                        {dp.km>0&&<div style={{fontSize:7,color:isV?"#fff":dc.tx}}>{dp.km}k</div>}
                      </div>
                    );
                  })}
                </div>
              ));
            })()}
          </div>
          <div style={card}>
            <p className="sl">Weekly km 📈</p>
            {[1,2,3,4,5,6].map(w=>{
              const wk=allDays.filter(d=>Math.ceil((dB(START,d)+1)/7)===w);
              const wkm=wk.reduce((s,d)=>s+(isG?getGP(d):getKP(d)).km,0);
              const labels=["Easing In 🌱","Building 📈","Consistent 🔁","Daily 🔥","Near Goal 🚀","GOAL 🎯"];
              return(
                <div key={w} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:11,fontWeight:700,color:T.tx}}>W{w} · {labels[w-1]}</span>
                    <span style={{fontSize:11,color:T.p,fontWeight:800}}>{wkm.toFixed(1)} km</span>
                  </div>
                  <div style={{height:5,background:T.ac,borderRadius:2}}>
                    <div style={{height:"100%",width:Math.min(100,(wkm/(isG?63:35))*100)+"%",background:`linear-gradient(90deg,${T.p},${T.s})`,borderRadius:2}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
