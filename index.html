<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Family Wellness</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:system-ui,sans-serif;}
.btn{cursor:pointer;transition:transform .12s;}.btn:active{transform:scale(.96);}
.overlay{position:fixed;inset:0;background:#0007;z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:12px;}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:20px;border:1px solid #e5e7eb;}
.tbtn{border-radius:20px;font-size:11px;font-weight:800;border:none;cursor:pointer;padding:6px 12px;}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;color:#9ca3af;}
.fade{animation:fi .3s ease;}@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.bounce{animation:bou 1s ease infinite;}@keyframes bou{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.pulse{animation:pul 2s infinite;}@keyframes pul{0%,100%{opacity:1}50%{opacity:.2}}
.spin{animation:sp .8s linear infinite;}@keyframes sp{to{transform:rotate(360deg)}}
.exrow{display:flex;align-items:center;gap:10px;padding:11px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px #0000000a;}
.exrow:active{background:#f9fafb;}
.mrow{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;margin-bottom:8px;cursor:pointer;}
.mrow:active{background:#f9fafb;}
/* Running panel styles */
.rcard{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-bottom:10px;}
.rct{font-size:11px;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.rmrow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-bottom:10px;}
.rm{background:#f9fafb;border-radius:10px;padding:9px;text-align:center;}
.rml{font-size:10px;color:#9ca3af;margin-bottom:2px;}
.rmv{font-size:15px;font-weight:800;color:#111827;}
.rhero{background:#E6F1FB;border:1px solid #85B7EB;border-radius:14px;padding:14px;margin-bottom:10px;}
.rtip{background:#dbeafe;border-radius:10px;padding:10px 12px;font-size:11px;color:#1e3a5f;line-height:1.5;margin-bottom:10px;}
.rfc{background:#f9fafb;border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.rft{font-size:9px;color:#9ca3af;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em;}
.rfn{font-size:12px;font-weight:700;color:#111827;margin-bottom:3px;}
.rfi{font-size:11px;color:#6b7280;line-height:1.6;}
.rfcal{font-size:10px;color:#9ca3af;margin-top:2px;}
.rgreen{background:#dcfce7;border:1px solid #86efac;border-radius:10px;padding:10px 12px;font-size:11px;color:#14532d;margin-bottom:10px;line-height:1.6;}
.ramber{background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:10px 12px;font-size:11px;color:#78350f;margin-bottom:10px;line-height:1.6;}
.rblue{background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;padding:10px 12px;font-size:11px;color:#1e3a5f;margin-bottom:10px;line-height:1.6;}
.rlbl{font-size:11px;color:#6b7280;display:block;margin-bottom:4px;margin-top:8px;}
.rlg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rbtn{width:100%;font-size:13px;padding:9px;cursor:pointer;font-weight:700;margin-top:10px;border-radius:10px;border:1px solid #d1d5db;background:#fff;color:#111827;}
.rrow{display:grid;grid-template-columns:62px 1fr 52px 72px;gap:5px;align-items:center;padding:8px 10px;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:4px;font-size:11px;}
.rbadge{font-size:10px;padding:2px 7px;border-radius:20px;text-align:center;white-space:nowrap;}
.rb-done{background:#dcfce7;color:#14532d;}
.rb-today{background:#dbeafe;color:#1e3a5f;}
.rb-up{background:#f3f4f6;color:#9ca3af;}
.rb-adj{background:#fef3c7;color:#78350f;}
.rb-miss{background:#fee2e2;color:#7f1d1d;}
.rb-rest{background:#f3f4f6;color:#9ca3af;}
.rdiv{border:none;border-top:1px solid #e5e7eb;margin:.875rem 0;}
.rspin{display:inline-block;width:10px;height:10px;border:1.5px solid #d1d5db;border-top-color:#3b82f6;border-radius:50%;animation:sp .8s linear infinite;margin-right:5px;vertical-align:middle;}
.rpb{height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin-top:7px;}
.rpf{height:100%;border-radius:2px;background:#3b82f6;}
</style>
</head>
<body>
<div id="root"></div>

<!-- ═══════════════════════════════════════════════════════
     RUNNING APP (vanilla JS panel, shown/hidden via React)
     ═══════════════════════════════════════════════════════ -->
<div id="run-panel" style="display:none;background:#f9fafb;min-height:100vh;">
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1e3a5f,#1d4ed8);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));">
    <div style="max-width:500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:18px;font-weight:800;color:#fff;">Geet · Running Tracker</div>
        <div style="font-size:11px;color:#93c5fd;margin-top:2px;">13km goal · May 1st · Claude-powered</div>
      </div>
      <button onclick="showWellness()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:6px 12px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;">← Back</button>
    </div>
  </div>
  <!-- Tab bar -->
  <div style="max-width:500px;margin:0 auto;padding:10px 16px 0;display:flex;gap:5px;flex-wrap:wrap;">
    <button class="rtab active" onclick="rTab('today',this)">Today</button>
    <button class="rtab" onclick="rTab('log',this)">Log run</button>
    <button class="rtab" onclick="rTab('schedule',this)">Schedule</button>
    <button class="rtab" onclick="rTab('nutrition',this)">Nutrition</button>
    <button class="rtab" onclick="rTab('progress',this)">Progress</button>
  </div>
  <style>
    .rtab{border-radius:20px;font-size:11px;font-weight:700;border:1px solid #d1d5db;cursor:pointer;padding:5px 12px;background:#fff;color:#6b7280;margin-bottom:0;}
    .rtab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8;}
  </style>
  <!-- Panels -->
  <div style="max-width:500px;margin:0 auto;padding:10px 16px 80px;">
    <div class="rpanel active" id="rp-today"><div id="r-today"></div></div>

    <div class="rpanel" id="rp-log">
      <div class="rcard">
        <div class="rct">Log today's run</div>
        <div class="rlg">
          <div><label class="rlbl">Date</label><input type="date" id="r-date" style="width:100%;padding:7px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;"></div>
          <div><label class="rlbl">Distance (km)</label><input type="number" id="r-km" step="0.1" min="0" max="40" placeholder="e.g. 8.5" style="width:100%;padding:7px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;"></div>
          <div><label class="rlbl">Duration (min)</label><input type="number" id="r-dur" step="1" placeholder="e.g. 65" style="width:100%;padding:7px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;"></div>
          <div><label class="rlbl">How did it feel?</label>
            <select id="r-feel" style="width:100%;padding:7px;border:1px solid #d1d5db;border-radius:8px;font-size:12px;">
              <option value="great">Great — felt strong</option>
              <option value="good" selected>Good — completed it</option>
              <option value="hard">Hard — pushed through</option>
              <option value="short">Fell short of target</option>
              <option value="injured">Pain / injury concern</option>
            </select>
          </div>
        </div>
        <label class="rlbl">Notes — Claude reads this and updates your plan</label>
        <textarea id="r-notes" rows="3" style="width:100%;font-size:12px;padding:8px;border-radius:8px;border:1px solid #d1d5db;background:#fff;resize:vertical;" placeholder="e.g. Knees got tight at 6km, had to slow right down. Breathing was fine."></textarea>
        <button class="rbtn" onclick="rLogRun()" style="background:#1d4ed8;color:#fff;border-color:#1d4ed8;">Save + ask Claude to update plan</button>
      </div>
      <div id="r-log-fb"></div>
      <div id="r-ai"></div>
      <div class="rdiv"></div>
      <div class="rct">Log weight</div>
      <div class="rlg">
        <div><label class="rlbl">Date</label><input type="date" id="r-wdate" style="width:100%;padding:7px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;"></div>
        <div><label class="rlbl">Weight (kg)</label><input type="number" id="r-wkg" step="0.1" placeholder="e.g. 108.2" style="width:100%;padding:7px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;"></div>
      </div>
      <button class="rbtn" onclick="rLogWeight()">Save weight</button>
      <div id="r-w-fb" style="margin-top:8px;"></div>
    </div>

    <div class="rpanel" id="rp-schedule">
      <div class="rmrow">
        <div class="rm"><div class="rml">runs done</div><div class="rmv" id="rs-done">0</div></div>
        <div class="rm"><div class="rml">km logged</div><div class="rmv" id="rs-km">0</div></div>
        <div class="rm"><div class="rml">days to goal</div><div class="rmv" id="rs-days">-</div></div>
        <div class="rm"><div class="rml">goal</div><div class="rmv" style="font-size:12px;">13km</div></div>
      </div>
      <div id="r-sched"></div>
    </div>

    <div class="rpanel" id="rp-nutrition">
      <div id="r-nutr-banner"></div>
      <div id="r-nutr-body"></div>
    </div>

    <div class="rpanel" id="rp-progress">
      <div class="rmrow">
        <div class="rm"><div class="rml">start</div><div class="rmv" style="font-size:12px;">109 kg</div></div>
        <div class="rm"><div class="rml">current</div><div class="rmv" style="font-size:12px;" id="rp-cur">109 kg</div></div>
        <div class="rm"><div class="rml">lost</div><div class="rmv" style="font-size:12px;" id="rp-lost">0 kg</div></div>
        <div class="rm"><div class="rml">run kcal</div><div class="rmv" style="font-size:12px;" id="rp-kcal">0</div></div>
      </div>
      <div class="rcard"><div class="rct">Run history</div><div id="rp-hist"></div></div>
      <div class="rcard"><div class="rct">Weekly km</div><div id="rp-weeks"></div></div>
    </div>
  </div>
  <style>.rpanel{display:none;}.rpanel.active{display:block;}</style>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- ═══════════════════════ RUNNING APP LOGIC ═══════════════════════ -->
<script>
const PK='geet_plan_v4',LK='geet_logs_v4',WK='geet_weights_v4',AK='geet_ai_v4';
const BP=[
  {date:'2025-03-31',type:'breakthrough',target:8.5,label:'Breakthrough run',tip:'2km mental chunks, water in hand. Slow pace. Push through the 7km wall.'},
  {date:'2025-04-01',type:'easy',target:6,label:'Easy jog',tip:'Shake out the legs. Conversational pace.'},
  {date:'2025-04-02',type:'rest',target:0,label:'Rest',tip:'Full rest. Let the adaptation settle.'},
  {date:'2025-04-03',type:'push',target:9,label:'Distance push',tip:'Same strategy as breakthrough. Slow and chunked.'},
  {date:'2025-04-04',type:'easy',target:7,label:'Easy jog',tip:'Finish the week controlled.'},
  {date:'2025-04-05',type:'rest',target:0,label:'Rest',tip:'Recovery.'},
  {date:'2025-04-06',type:'rest',target:0,label:'Rest',tip:'Recovery.'},
  {date:'2025-04-07',type:'push',target:9.5,label:'Distance push',tip:'Close in on 10km.'},
  {date:'2025-04-08',type:'easy',target:7,label:'Easy jog',tip:'Easy.'},
  {date:'2025-04-09',type:'push',target:10,label:'First 10km',tip:'Your first 10km. Milestone. Slow, chunked, water.'},
  {date:'2025-04-10',type:'rest',target:0,label:'Rest',tip:'Recovery after first 10km.'},
  {date:'2025-04-11',type:'easy',target:7,label:'Easy jog',tip:'Easy shake out.'},
  {date:'2025-04-12',type:'push',target:10,label:'Confirm 10km',tip:'Second 10km. Should feel slightly easier.'},
  {date:'2025-04-13',type:'rest',target:0,label:'Rest',tip:'Recovery.'},
  {date:'2025-04-14',type:'easy',target:8,label:'Easy jog',tip:'Easy.'},
  {date:'2025-04-15',type:'push',target:10,label:'Solid 10km',tip:'Third 10km. Getting comfortable.'},
  {date:'2025-04-16',type:'rest',target:0,label:'Rest',tip:'Rest.'},
  {date:'2025-04-17',type:'push',target:10,label:'Solid 10km',tip:'10km is becoming your base.'},
  {date:'2025-04-18',type:'easy',target:8,label:'Easy jog',tip:'Easy.'},
  {date:'2025-04-19',type:'push',target:10,label:'Strong 10km',tip:'Confidence building.'},
  {date:'2025-04-20',type:'rest',target:0,label:'Rest',tip:'Rest.'},
  {date:'2025-04-21',type:'easy',target:8,label:'Easy jog',tip:'Easy.'},
  {date:'2025-04-22',type:'push',target:10,label:'Final prep 10km',tip:'Last big effort before the streak.'},
  {date:'2025-04-23',type:'rest',target:0,label:'Rest',tip:'Last rest before the streak. Eat well, sleep early.'},
  {date:'2025-04-24',type:'streak',target:10,label:'Streak day 1',tip:'First of 5 consecutive 10km days.'},
  {date:'2025-04-25',type:'streak',target:10,label:'Streak day 2',tip:'Slow the pace if needed.'},
  {date:'2025-04-26',type:'streak',target:10,label:'Streak day 3',tip:'Fatigue may kick in. Slow down, do not stop.'},
  {date:'2025-04-27',type:'streak',target:10,label:'Streak day 4',tip:'Mental strength day.'},
  {date:'2025-04-28',type:'streak',target:10,label:'Streak day 5',tip:'Last 10km before the goal push.'},
  {date:'2025-04-29',type:'goal',target:13,label:'Goal day 1 — 13km',tip:'2km chunks. You are ready.'},
  {date:'2025-04-30',type:'goal',target:13,label:'Goal day 2 — 13km',tip:'Trust the training.'},
  {date:'2025-05-01',type:'goal',target:13,label:'Goal day 3 — 13km',tip:'May 1st. Goal achieved.'},
];
const gP=()=>{try{const s=localStorage.getItem(PK);return s?JSON.parse(s):JSON.parse(JSON.stringify(BP));}catch(e){return JSON.parse(JSON.stringify(BP));}};
const gL=()=>{try{return JSON.parse(localStorage.getItem(LK)||'[]');}catch(e){return[];}};
const gW=()=>{try{return JSON.parse(localStorage.getItem(WK)||'[]');}catch(e){return[];}};
const gA=()=>{try{return JSON.parse(localStorage.getItem(AK)||'[]');}catch(e){return[];}};
const sP=p=>{try{localStorage.setItem(PK,JSON.stringify(p));}catch(e){}};
const sL=l=>{try{localStorage.setItem(LK,JSON.stringify(l));}catch(e){}};
const sW=w=>{try{localStorage.setItem(WK,JSON.stringify(w));}catch(e){}};
const sA=a=>{try{localStorage.setItem(AK,JSON.stringify(a));}catch(e){}};
const tod=()=>new Date().toISOString().split('T')[0];
const fmt=d=>new Date(d+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'});
const pace=(dur,km)=>{if(!dur||!km)return'';const p=dur/km;const m=Math.floor(p);const s=Math.round((p-m)*60);return m+':'+(s<10?'0':'')+s+'/km';};

function showWellness(){document.getElementById('run-panel').style.display='none';document.getElementById('root').style.display='block';}
function showRunning(){document.getElementById('root').style.display='none';document.getElementById('run-panel').style.display='block';document.getElementById('r-date').value=tod();document.getElementById('r-wdate').value=tod();rRenderToday();}

function rTab(id,btn){
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.rpanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('rp-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='schedule')rSched();
  if(id==='nutrition')rNutr();
  if(id==='progress')rProg();
}

function rRenderToday(){
  const plan=gP(),logs=gL(),today=tod();
  const dp=plan.find(p=>p.date===today);
  const log=logs.find(l=>l.date===today);
  const ai=gA().find(n=>n.date===today);
  let h='';
  if(!dp){h='<div class="ramber">No plan entry for today. Plan runs Mar 31 – May 1.</div>';}
  else if(dp.type==='rest'){
    h='<div class="rcard"><div style="font-size:11px;color:#9ca3af;margin-bottom:5px;">'+fmt(today)+'</div><div style="font-size:26px;font-weight:800;color:#374151;">Rest day</div><div style="font-size:12px;color:#6b7280;margin-top:5px;">Recovery is training. Eat clean, hydrate, sleep well.</div></div>';
    h+='<div class="rfc"><div class="rft">today\'s food</div><div class="rfn">Rest day eating</div><div class="rfi">Lower carbs, same protein. Meal 1: 3 eggs + dal + 1 roti. Meal 2: 120g chicken + vegetables + small rice. Close window by 8:30pm.</div></div>';
  } else {
    const km=log?log.km:dp.target;
    const pct=log?Math.min(100,Math.round(log.km/dp.target*100)):0;
    h+='<div class="rhero"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;"><div>';
    h+='<div style="font-size:11px;color:#1d4ed8;font-weight:700;margin-bottom:3px;">'+fmt(today)+' · '+dp.label+'</div>';
    h+='<div style="font-size:34px;font-weight:800;color:#1e3a5f;line-height:1;">'+km+'<span style="font-size:14px;color:#3b82f6;"> km</span></div>';
    h+='<div style="font-size:11px;color:#3b82f6;margin-top:3px;">'+(log?'logged · '+pace(log.dur,log.km):'target · not yet logged')+'</div></div>';
    h+='<span style="background:'+(log?'#14532d':'#1e3a5f')+';color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;">'+(log?'done':'today')+'</span></div>';
    if(dp.adjusted)h+='<div class="ramber" style="font-size:10px;margin:0 0 7px;">Claude adjusted: '+dp.adjustReason+'</div>';
    h+='<div class="rpb"><div class="rpf" style="width:'+pct+'%"></div></div></div>';
    h+='<div class="rtip">'+dp.tip+'</div>';
    if(ai&&ai.data){h+='<div class="rblue"><strong style="display:block;margin-bottom:3px;">Claude\'s note:</strong>'+ai.data.assessment+'</div>';if(ai.data.next_run_tip)h+='<div class="rfc"><div class="rft">next run tip</div><div class="rfi">'+ai.data.next_run_tip+'</div></div>';}
    h+='<div class="rdiv"><div class="rct">Today\'s food</div>';
    const isS=dp.type==='streak'||dp.type==='goal';
    h+='<div class="rfc"><div class="rft">12:00–1:00pm · break fast</div><div class="rfn">Meal 1</div><div class="rfi">2–3 eggs · 1 cup dal · 1–2 roti · black coffee</div><div class="rfcal">~400 kcal · 22g protein</div></div>';
    h+='<div class="rfc"><div class="rft">~5:00pm · pre-run</div><div class="rfn">Pre-run snack</div><div class="rfi">'+(dp.target>=9?'1 banana + small bowl rice':'1 banana')+' · 500ml water</div><div class="rfcal">~150–200 kcal</div></div>';
    h+='<div class="rfc" style="border:1px solid #86efac;"><div class="rft">~7:00pm · biggest meal</div><div class="rfn" style="color:#14532d;">Post-run meal</div><div class="rfi">'+(isS?'200g':'150g')+' chicken or fish · 1 cup rice · sabzi/dal · buttermilk</div><div class="rfcal">'+(isS?'~700 kcal · 50g protein':'~620 kcal · 42g protein')+'</div></div>';
    h+='<div class="rfc"><div class="rft">~8:30pm · close</div><div class="rfn">Optional</div><div class="rfi">Small curd or 1 egg · then done</div></div>';
  }
  const up=gP().filter(p=>p.date>today&&p.type!=='rest').slice(0,3);
  if(up.length){h+='<div class="rdiv"></div><div class="rct">Up next</div>';h+=up.map(p=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:12px;"><span style="color:#9ca3af;min-width:52px;">'+fmt(p.date)+'</span><span style="flex:1;color:#111827;font-weight:700;padding:0 8px;">'+p.label+'</span><span style="color:#6b7280;">'+p.target+'km</span>'+(p.adjusted?'<span class="rbadge rb-adj" style="margin-left:4px;">adj</span>':'')+'</div>').join('');}
  document.getElementById('r-today').innerHTML=h;
}

async function rLogRun(){
  const date=document.getElementById('r-date').value;
  const km=parseFloat(document.getElementById('r-km').value);
  const dur=parseInt(document.getElementById('r-dur').value)||0;
  const feel=document.getElementById('r-feel').value;
  const notes=document.getElementById('r-notes').value.trim();
  if(!date||isNaN(km)||km<=0){document.getElementById('r-log-fb').innerHTML='<div class="ramber">Please enter a valid date and distance.</div>';return;}
  const logs=gL(),plan=gP();
  const planned=plan.find(p=>p.date===date);
  const entry={date,km,dur,feel,notes,at:new Date().toISOString()};
  const ex=logs.findIndex(l=>l.date===date);
  if(ex>=0)logs[ex]=entry;else logs.push(entry);
  sL(logs);
  document.getElementById('r-log-fb').innerHTML='<div class="rgreen">Run saved.</div>';
  const aiDiv=document.getElementById('r-ai');
  aiDiv.innerHTML='<div style="background:#f9fafb;border-radius:10px;padding:12px;font-size:12px;color:#6b7280;"><span class="rspin"></span>Claude is reading your notes and updating your plan...</div>';

function rProg(){

  const totalKm=logs.reduce((a,l)=>a+l.km,0);
  document.getElementById('rp-kcal').textContent=Math.round(totalKm*75).toLocaleString();

}

        {tab==="exercises"&&<div>
          <div style={{...card,background:T.ac}}><p style={{fontSize:12,color:T.p,fontWeight:800}}>{isG?"💪 Today's Strength":"💪 Today's Toning"}</p><p style={{fontSize:11,color:T.dim,marginTop:2}}>{isG?plan.sn:plan.tn} · Tap for form tips 💡</p></div>
          {exs.map((ex,i)=>(<div key={i} className="exrow btn" onClick={()=>setSE(ex)}><span style={{fontSize:20}}>{ex.e}</span><div style={{flex:1}}><p style={{fontSize:13,fontWeight:700,color:T.tx}}>{ex.n}</p><p style={{fontSize:10,color:T.dim}}>{EXDB[ex.n]?.muscles||"Tap for details"}</p></div><span style={{fontSize:10,fontWeight:700,color:T.p,background:T.ac,padding:"3px 8px",borderRadius:20,border:`1px solid ${T.p}33`,marginRight:6}}>{ex.s}</span><span style={{color:"#ef4444",fontSize:16}}>▶</span></div>))}
          <div style={card}><p className="sl" style={{color:T.p}}>🎬 Recommended channels</p>{(isG?[{n:"Athlean-X 🔬 — Elbow-safe training",u:"https://www.youtube.com/@athleanx"},{n:"Ben Parkes 🏃 — Runner coaching",u:"https://www.youtube.com/@BenParkesRunning"}]:[{n:"MaddFit 🌸 — Women's toning",u:"https://www.youtube.com/@MaddFit"},{n:"Chloe Ting 🔥 — 20 min workouts",u:"https://www.youtube.com/@ChloeTing"}]).map((ch,i)=>(<div key={i} className="mrow btn" onClick={()=>window.open(ch.u,"_blank")} style={{background:"#fff5f5",border:"1px solid #fecaca"}}><span style={{fontSize:16}}>▶️</span><p style={{fontSize:12,fontWeight:700,color:"#dc2626",flex:1}}>{ch.n}</p></div>))}</div>
        </div>}
        {tab==="meals"&&<div>
          <div style={{...card,background:T.ac,display:"flex",justifyContent:"space-between"}}><div><p style={{fontSize:10,color:T.p,fontWeight:800}}>{plan.IF.label}</p><p style={{fontSize:11,color:T.dim}}>{plan.IF.fast}hr fast</p></div><div style={{display:"flex",gap:8}}>{[{l:"Opens",v:plan.IF.open},{l:"Closes",v:plan.IF.close}].map(i=>(<div key={i.l} style={{background:"#fff",borderRadius:8,padding:"5px 8px",textAlign:"center"}}><p style={{fontSize:".85rem",fontWeight:900,color:T.p}}>{i.v}</p><p style={{fontSize:8,color:T.dim,textTransform:"uppercase"}}>{i.l}</p></div>))}</div></div>
          {[{d:plan.meal.pw,l:"🥤 Pre-Workout",t:"Before exercise"},{d:plan.meal.br,l:"🥗 Brunch",t:"12:00–1:00 PM"},{d:plan.meal.sn,l:"🍎 Snack",t:"4:00 PM"},{d:plan.meal.dn,l:"🍽️ Dinner",t:"7:00 PM"}].map(({d,l,t})=>d&&(<div key={l} style={card}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><p style={{fontSize:12,fontWeight:800,color:T.p}}>{l}</p><span style={{fontSize:9,color:T.dim}}>{t}</span></div><p style={{fontSize:13,fontWeight:700,marginBottom:4,color:T.tx}}>{d.n}</p><p style={{fontSize:11,color:T.dim,lineHeight:1.6}}>{d.r}</p></div>))}
          <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:12,padding:12}}><p style={{fontSize:11,color:"#16a34a",fontWeight:800}}>Geet: {plan.meal.gT} kcal · Kanak: {plan.meal.kT} kcal</p><p style={{fontSize:11,color:"#16a34a",marginTop:4}}>💡 {plan.meal.tip}</p></div>
        </div>}
        {tab==="reminders"&&<div>
          <div style={{background:`linear-gradient(135deg,${T.p},${T.s})`,borderRadius:20,padding:24,marginBottom:14,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:8}} className="bounce">🔔</div>
            <p style={{fontSize:18,fontWeight:900,color:"#fff",marginBottom:6}}>Stay on Track</p>
            <p style={{fontSize:12,color:"#ffffff99",marginBottom:20,lineHeight:1.7}}>9 daily nudges · IF alerts · motivation{!isG?" · Kanak's 6:45 PM pooja 🪔":""}</p>
            <button className="btn" onClick={async()=>{if(typeof Notification==="undefined"){alert("Open in Safari (iPhone) or Chrome (Android).");return;}if(Notification.permission==="granted"){new Notification(`Hey ${isG?"Geet":"Kanak"}! 👋`,{body:"Reminders are already on!"});return;}if(Notification.permission==="denied"){alert("Blocked.\niPhone: Settings → Safari → Notifications → Allow");return;}const p=await Notification.requestPermission();if(p==="granted")new Notification(`🎉 You're set ${isG?"Geet":"Kanak"}!`,{body:`Daily wellness reminders active! ${isG?"🔥":"🌸"}`});else alert("Blocked — enable in Settings.");}} style={{background:"#fff",border:"none",borderRadius:25,padding:"13px 36px",color:T.p,fontSize:14,fontWeight:900,cursor:"pointer"}}>{typeof Notification!=="undefined"&&Notification.permission==="granted"?"✅ Enabled — Tap to Test":"Enable Notifications"}</button>
          </div>
        </div>}
        {tab==="calendar"&&<div>
          <div style={card}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:T.dim}}>{d}</div>)}</div>
            {(()=>{const rows=[];let row=[];for(let i=0;i<START.getDay();i++)row.push(null);allDays.forEach(d=>{if(row.length===7){rows.push(row);row=[];}row.push(d);});while(row.length<7)row.push(null);rows.push(row);return rows.map((r,ri)=>(<div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>{r.map((d,di)=>{if(!d)return<div key={di}/>;const dp=isG?getGP(d):getKP(d);const dc=isG?(GRC[dp.rt]||GRC.rest):(KAC[dp.ac]||KAC.rest);const isV=d.toDateString()===vd.toDateString();const isT=d.toDateString()===eff.toDateString();return(<div key={di} onClick={()=>{setVD(new Date(d));setTab("today");setCK({});}} style={{background:isV?dc.badge:dc.bg,border:`1px solid ${isV?dc.badge:dc.bd}`,borderRadius:5,padding:"3px 1px",textAlign:"center",opacity:d<eff&&!isT?0.3:1,cursor:"pointer",position:"relative"}}>{isT&&<div className="pulse" style={{position:"absolute",top:1,right:1,width:4,height:4,borderRadius:"50%",background:T.p}}/>}<div style={{fontSize:8,color:isV?"#fff":dc.tx,fontWeight:700}}>{d.getDate()}</div><div style={{fontSize:9}}>{dc.em}</div>{dp.km>0&&<div style={{fontSize:7,color:isV?"#fff":dc.tx}}>{dp.km}k</div>}</div>);})}</div>));})()} 
          </div>
        </div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
